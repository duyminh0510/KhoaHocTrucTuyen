<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý nhân viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            overflow-x: hidden;
        }

        #sidebar {
            width: 250px;
            position: fixed;
            top: 0;
            left: -250px;
            height: 100%;
            background-color: #343a40;
            color: white;
            transition: left 0.3s ease;
            z-index: 1050;
        }

        #sidebar.active {
            left: 0;
        }

        #sidebar .nav-link {
            color: #adb5bd;
        }

        #sidebar .nav-link:hover {
            color: #fff;
        }

        #content {
            margin-left: 0;
            transition: margin-left 0.3s ease;
        }

        #content.shifted {
            margin-left: 250px;
        }

        #toggle-btn {
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div id="sidebar" class="bg-dark">
        <div class="p-3 border-bottom">
            <h4>Quản lý</h4>
        </div>
        <nav class="nav flex-column p-3">
            <a class="nav-link" href="#">📦 Quản lý thanh toán</a>
            <a class="nav-link" href="#">💰 Giao dịch khóa học</a>
            <a class="nav-link" href="#">👨‍🎓 Quản lý học viên</a>
            <a class="nav-link" href="#">📢 Quản lý thông báo</a>
            <a class="nav-link" href="#">📈 Thống kê (NV)</a>
            <a class="nav-link" href="#">📊 Thống kê hệ thống</a>
            <a class="nav-link" href="#">💬 Bình luận, đánh giá</a>
        </nav>
    </div>

    <!-- Main Content -->
    <div id="content">
        <nav class="navbar navbar-light bg-light">
            <div class="container-fluid">
                <span id="toggle-btn" class="navbar-toggler-icon"></span>
                <span class="navbar-text fw-bold">Trang quản lý nhân viên</span>
            </div>
        </nav>

        <div class="container mt-4">
            <h2>Chào mừng bạn đến hệ thống quản lý!</h2>
            <p>Chọn chức năng bên thanh menu để tiếp tục.</p>
        </div>
    </div>

    <!-- Bootstrap JS & Toggle Script -->
    <script>
        const toggleBtn = document.getElementById("toggle-btn");
        const sidebar = document.getElementById("sidebar");
        const content = document.getElementById("content");

        toggleBtn.addEventListener("click", () => {
            sidebar.classList.toggle("active");
            content.classList.toggle("shifted");
        });
    </script>
</body>

</html>
