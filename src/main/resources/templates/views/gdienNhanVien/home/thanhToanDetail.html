<!DOCTYPE html>
<html lang="vi" th:replace="~{/views/gdienNhanVien/layout/templateNhanVien.html::view(~{::main},~{::title})}">
<head>
    <title>Chi tiết thanh toán</title>
</head>
<body>
<main>
    <div class="container py-4">
        <h2 class="mb-4 fw-bold text-primary-custom">Chi tiết thanh toán</h2>
        <div class="card bg-dark text-white shadow">
            <div class="card-body">
                <ul class="list-group list-group-flush">
                    <li class="list-group-item bg-dark text-white"><b>ID:</b> <span th:text="${tt.id}"></span></li>
                    <li class="list-group-item bg-dark text-white"><b>Học viên:</b> <span th:text="${tt.tenHocVien}"></span></li>
                    <li class="list-group-item bg-dark text-white"><b>Email:</b> <span th:text="${tt.email}"></span></li>
                    <li class="list-group-item bg-dark text-white"><b>Ngày thanh toán:</b> <span th:text="${tt.ngayThanhToan}"></span></li>
                    <li class="list-group-item bg-dark text-white"><b>Hình thức:</b> <span th:text="${tt.hinhThuc}"></span></li>
                    <li class="list-group-item bg-dark text-white"><b>Tổng tiền:</b> <span th:text="${#numbers.formatDecimal(tt.tongTien, 0, 'COMMA', 2, 'POINT')} + ' đ'"></span></li>
                    <li class="list-group-item bg-dark text-white"><b>Trạng thái:</b> <span th:text="${tt.trangThai}"></span></li>
                    <li class="list-group-item bg-dark text-white"><b>Khóa học:</b> <span th:text="${tt.tenKhoaHoc}"></span></li>
                    <li class="list-group-item bg-dark text-white"><b>Mã giao dịch:</b> <span th:text="${tt.maGiaoDich}"></span></li>
                    <li class="list-group-item bg-dark text-white"><b>Ghi chú:</b> <span th:text="${tt.ghiChu}"></span></li>
                </ul>
                <div class="mt-4">
                    <a href="/nhanvien/thanh-toan" class="btn btn-outline-light">Quay lại danh sách</a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
