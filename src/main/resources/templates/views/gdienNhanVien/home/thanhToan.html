<!DOCTYPE html>
<html lang="vi" th:replace="~{/views/gdienNhanVien/layout/templateNhanVien.html::view(~{::main},~{::title})}">
<head>
    <title>Quản lý thanh toán</title>
    <style>
        .table-payment th, .table-payment td {
            vertical-align: middle;
            text-align: center;
        }
        .badge-success { background: #43a047 !important; }
        .badge-warning { background: #ffb300 !important; color: #0b1c36 !important; }
        .badge-danger { background: #e53935 !important; }
    </style>
</head>
<body>
<main>
    <div class="container py-4">
        <h2 class="mb-4 fw-bold text-primary-custom">📦 Quản lý thanh toán</h2>
        <div class="table-responsive">
            <table class="table table-dark table-hover align-middle table-payment">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Học viên</th>
                        <th>Email</th>
                        <th>Ngày thanh toán</th>
                        <th>Hình thức</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Khóa học</th>
                        <th>Chi tiết</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="tt : ${listThanhToan}">
                        <td th:text="${tt.id}"></td>
                        <td th:text="${tt.tenHocVien}"></td>
                        <td th:text="${tt.email}"></td>
                        <td th:text="${tt.ngayThanhToan}"></td>
                        <td th:text="${tt.hinhThuc}"></td>
                        <td th:text="${#numbers.formatDecimal(tt.tongTien, 0, 'COMMA', 2, 'POINT')} + ' đ'"></td>
                        <td>
                            <span th:classappend="
                                ${tt.trangThai} == 'THANH_CONG' ? 'badge badge-success' :
                                (${tt.trangThai} == 'DANG_CHO' ? 'badge badge-warning' : 'badge badge-danger')"
                                th:text="${tt.trangThai}">
                            </span>
                        </td>
                        <td th:text="${tt.tenKhoaHoc}"></td>
                        <td>
                            <a th:href="@{'/nhanvien/thanh-toan/' + ${tt.id}}" class="btn btn-sm btn-outline-info">Xem</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
        <!-- Modal chi tiết -->
        <div class="modal fade" id="modalDetail" tabindex="-1">
            <div class="modal-dialog">
                <div class="modal-content bg-dark text-white">
                    <div class="modal-header">
                        <h5 class="modal-title">Chi tiết thanh toán</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body" id="modalDetailBody"></div>
                    <div class="modal-footer">
                        <button class="btn btn-success" onclick="alert('Duyệt thành công!')">Duyệt</button>
                        <button class="btn btn-danger" onclick="alert('Đã hủy giao dịch!')">Hủy</button>
                        <button class="btn btn-secondary" onclick="window.print()">In hóa đơn</button>
                        <button class="btn btn-outline-light" data-bs-dismiss="modal">Đóng</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<!-- Đặt script sau modal, ngay trước </body> -->
<script>
function showDetail(btn) {
    var html = `
        <ul class="list-group list-group-flush">
            <li class="list-group-item bg-dark text-white"><b>ID:</b> ${btn.dataset.id}</li>
            <li class="list-group-item bg-dark text-white"><b>Học viên:</b> ${btn.dataset.ten}</li>
            <li class="list-group-item bg-dark text-white"><b>Email:</b> ${btn.dataset.email}</li>
            <li class="list-group-item bg-dark text-white"><b>Ngày thanh toán:</b> ${btn.dataset.ngay}</li>
            <li class="list-group-item bg-dark text-white"><b>Hình thức:</b> ${btn.dataset.hinhthuc}</li>
            <li class="list-group-item bg-dark text-white"><b>Tổng tiền:</b> ${btn.dataset.tongtien}</li>
            <li class="list-group-item bg-dark text-white"><b>Trạng thái:</b> ${btn.dataset.trangthai}</li>
            <li class="list-group-item bg-dark text-white"><b>Khóa học:</b> ${btn.dataset.khoahoc}</li>
            <li class="list-group-item bg-dark text-white"><b>Mã giao dịch:</b> ${btn.dataset.magiaodich}</li>
            <li class="list-group-item bg-dark text-white"><b>Ghi chú:</b> ${btn.dataset.ghichu}</li>
        </ul>
    `;
    document.getElementById('modalDetailBody').innerHTML = html;
    var modal = new bootstrap.Modal(document.getElementById('modalDetail'));
    modal.show();
}
function showDetailDemo() {
    var html = `
        <ul class="list-group list-group-flush">
            <li class="list-group-item bg-dark text-white"><b>ID:</b> 1</li>
            <li class="list-group-item bg-dark text-white"><b>Học viên:</b> Nguyễn Văn A</li>
            <li class="list-group-item bg-dark text-white"><b>Email:</b> a@gmail.com</li>
            <li class="list-group-item bg-dark text-white"><b>Ngày thanh toán:</b> 01/06/2024 10:00</li>
            <li class="list-group-item bg-dark text-white"><b>Hình thức:</b> VNPAY</li>
            <li class="list-group-item bg-dark text-white"><b>Tổng tiền:</b> 1.500.000 đ</li>
            <li class="list-group-item bg-dark text-white"><b>Trạng thái:</b> THANH_CONG</li>
            <li class="list-group-item bg-dark text-white"><b>Khóa học:</b> Java Cơ bản</li>
            <li class="list-group-item bg-dark text-white"><b>Mã giao dịch:</b> GD001</li>
            <li class="list-group-item bg-dark text-white"><b>Ghi chú:</b> Thanh toán thành công</li>
        </ul>
    `;
    document.getElementById('modalDetailBody').innerHTML = html;
    var modal = new bootstrap.Modal(document.getElementById('modalDetail'));
    modal.show();
}
</script>
</body>
</html>
